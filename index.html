<!DOCTYPE html>
<script>if(/Mobi|Android|iPhone|iPod/i.test(navigator.userAgent)&&!location.pathname.includes("/h5")){location.href="/h5";}</script>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>虾虾百宝箱 🦐</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { overflow-x: hidden; font-family: 'Nunito', 'KaiTi', 'STKaiti', '楷体', 'PingFang SC', sans-serif; background: #f0f8f5; min-height: 100vh; color: #2d3436; }
  
  /* ===== 基础（手机端优先） ===== */
  .page { display: none; padding: 16px; max-width: 600px; margin: 0 auto; padding-bottom: 90px; }
  .page.active { display: block; }
  
  .home-header { text-align: center; padding: 30px 16px 20px; }
  .home-header h1 { font-size: 28px; font-weight: 800; background: linear-gradient(135deg, #7ec8e3, #89d4b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .home-header p { font-size: 14px; color: #a0b8b0; margin-top: 4px; }
  
  .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
  .menu-card { background: #fff; border-radius: 20px; padding: 24px 12px; text-align: center; cursor: pointer; box-shadow: 0 3px 16px rgba(137,212,182,0.15); transition: transform .2s, box-shadow .2s; }
  .menu-card:active { transform: scale(.95); }
  .menu-card .icon { font-size: 34px; margin-bottom: 8px; display: block; }
  .menu-card .name { font-size: 15px; font-weight: 700; color: #3d5a5c; letter-spacing: 1px; }
  .menu-card .desc { font-size: 11px; color: #aabfbb; margin-top: 4px; }
  
  .badge-count { display: inline-block; background: #ff9eaa; color: #fff; font-size: 11px; padding: 1px 7px; border-radius: 10px; margin-left: 4px; }
  
  /* ===== 桌面导航（手机隐藏） ===== */
  .desktop-nav { display: none; }
  
  /* ===== 底部导航 ===== */
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,.92); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); display: flex; border-top: 1px solid rgba(137,212,182,.25); padding-bottom: env(safe-area-inset-bottom); z-index: 50; }
  .bottom-nav button { flex: 1; padding: 8px 4px; border: none; background: none; font-family: inherit; font-size: 11px; color: #aabfbb; cursor: pointer; transition: color .2s; }
  .bottom-nav button.active { color: #7ec8e3; }
  .bottom-nav button .nav-icon { font-size: 22px; display: block; margin-bottom: 2px; }
  
  /* ===== 通用 ===== */
  .back-btn { border: none; background: none; font-family: inherit; font-size: 15px; color: #89d4b6; padding: 8px 0; cursor: pointer; margin-bottom: 8px; display: inline-block; font-weight: 600; }
  .card { background: #fff; border-radius: 16px; padding: 18px; margin-bottom: 10px; box-shadow: 0 3px 16px rgba(137,212,182,.12); border: 1px solid rgba(137,212,182,.12); }
  .card-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; color: #3d5a5c; }
  label { display: block; font-size: 14px; font-weight: 600; color: #3d5a5c; margin: 10px 0 4px; }
  input, textarea, select { width: 100%; padding: 10px 14px; border: 1.5px solid #d4eae3; border-radius: 12px; font-size: 14px; font-family: inherit; background: #f8fcfb; transition: border-color .2s; color: #2d3436; }
  input:focus, textarea:focus, select:focus { outline: none; border-color: #89d4b6; box-shadow: 0 0 0 3px rgba(137,212,182,.15); }
  textarea { resize: vertical; min-height: 60px; }
  .btn { padding: 10px 24px; border: none; border-radius: 12px; font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; transition: all .2s; }
  .btn-primary { background: linear-gradient(135deg, #b8e1f5, #a8e6cf); color: #3d5a5c; box-shadow: 0 2px 10px rgba(137,212,182,.25); }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(137,212,182,.35); }
  .btn-sm { padding: 6px 16px; font-size: 13px; }
  .btn-danger { background: #ffe0e6; color: #e07080; }
  .btn-danger:hover { background: #ffd0d8; }
  .tag { display: inline-block; padding: 2px 12px; border-radius: 20px; font-size: 11px; margin: 2px; background: #e8f5f0; color: #6a9e92; cursor: pointer; transition: all .2s; }
  .tag.active { background: #b8e1f5; color: #3d6a7c; font-weight: 600; }
  .empty-state { text-align: center; padding: 40px 0; color: #c5d9d3; }
  .empty-state .icon { font-size: 48px; margin-bottom: 8px; }
  
  .item-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
  .item-card { overflow: hidden; background: #fff; border-radius: 14px; padding: 14px; box-shadow: 0 2px 12px rgba(137,212,182,.1); cursor: pointer; transition: transform .15s, box-shadow .15s; border: 1px solid rgba(137,212,182,.08); }
  .item-card:active { transform: scale(.98); }
  .item-card h4 { font-size: 15px; margin-bottom: 4px; font-weight: 700; color: #2d3436; }
  .item-card .meta { font-size: 12px; color: #a0b8b0; display: flex; gap: 8px; flex-wrap: wrap; }
  .item-card .preview { font-size: 13px; color: #6a9e92; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  
  .search-bar { display: flex; gap: 8px; margin-bottom: 12px; }
  .search-bar input { flex: 1; }
  .search-bar select { width: auto; padding: 8px; color: #3d5a5c; }
  
  .progress-bar { height: 6px; background: #e8f5f0; border-radius: 4px; overflow: hidden; }
  .progress-bar .fill { height: 100%; background: linear-gradient(90deg, #b8e1f5, #a8e6cf); border-radius: 4px; transition: width .3s; }
  
  .checkin-btn { display: block; width: 100%; padding: 14px; border: none; border-radius: 14px; font-size: 16px; font-weight: 700; font-family: inherit; cursor: pointer; margin: 12px 0; transition: all .2s; }
  .checkin-btn.done { background: #d4edda; color: #3d7a5a; }
  .checkin-btn.pending { background: linear-gradient(135deg, #b8e1f5, #a8e6cf); color: #3d5a5c; box-shadow: 0 3px 14px rgba(137,212,182,.3); }
  .checkin-btn:active { transform: scale(.97); }
  .checkin-btn.pending:hover { transform: translateY(-1px); box-shadow: 0 5px 20px rgba(137,212,182,.4); }
  
  .phase-item { display: flex; align-items: center; padding: 10px 14px; border-left: 3px solid #b8e1f5; margin-bottom: 6px; background: #f8fcfb; border-radius: 0 12px 12px 0; }
  .phase-item.done { border-left-color: #a8e6cf; opacity: .7; }
  .phase-item .phase-info { flex: 1; }
  .phase-item .phase-name { font-weight: 700; font-size: 14px; color: #3d5a5c; }
  .phase-item .phase-dates { font-size: 12px; color: #a0b8b0; }
  
  .overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(45,52,54,.35); z-index: 100; justify-content: center; align-items: center; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
  .overlay.show { display: flex; }
  .overlay-box { background: #fff; border-radius: 20px; padding: 28px; width: 88%; max-width: 340px; max-height: 80vh; overflow-y: auto; box-shadow: 0 10px 40px rgba(137,212,182,.2); }
  .overlay-box h3 { margin-bottom: 12px; color: #3d5a5c; font-weight: 800; }
  .overlay-box .btn-row { display: flex; gap: 10px; margin-top: 14px; }
  .overlay-box .btn-row button { flex: 1; }
  
  /* ===== 电脑端（≥960px） ===== */
  @media (min-width: 960px) {
    body { background: #ecf5f1; }
    .page { max-width: 720px; padding: 24px 40px; padding-bottom: 32px; }
    
    .home-header { padding: 50px 0 30px; }
    .home-header h1 { font-size: 40px; }
    .home-header p { font-size: 16px; }
    
    .menu-grid { grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: 30px; }
    .menu-card { padding: 36px 20px; border-radius: 24px; }
    .menu-card:hover { transform: translateY(-6px); box-shadow: 0 12px 32px rgba(137,212,182,.2); }
    .menu-card .icon { font-size: 48px; }
    .menu-card .name { font-size: 18px; }
    .menu-card .desc { font-size: 13px; }
    
    .bottom-nav { display: none; }
    
    .desktop-nav { display: block; position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,.88); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid rgba(137,212,182,.2); }
    .desktop-nav-inner { max-width: 100%; margin: 0 auto; padding: 0 40px; display: flex; align-items: center; height: 60px; }
    .desktop-nav-brand { font-size: 20px; font-weight: 800; background: linear-gradient(135deg, #7ec8e3, #89d4b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-right: 32px; white-space: nowrap; }
    .desktop-nav-links { display: flex; gap: 4px; }
    .desktop-nav-links a { text-decoration: none; padding: 8px 18px; border-radius: 12px; font-size: 15px; font-weight: 600; color: #7aa699; transition: all .15s; font-family: inherit; }
    .desktop-nav-links a:hover { background: #e8f5f0; color: #3d5a5c; }
    .desktop-nav-links a.active { background: linear-gradient(135deg, #b8e1f5, #a8e6cf); color: #3d5a5c; }
    
    .item-grid { grid-template-columns: 1fr; gap: 12px; max-width: 700px; margin: 0 auto; }
    
    .card { padding: 24px; border-radius: 18px; }
    .card-title { font-size: 18px; }
    
    .item-card { padding: 18px; border-radius: 16px; }
    .item-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(137,212,182,.15); }
    .item-card h4 { font-size: 16px; }
    .item-card .meta { font-size: 13px; }
    .item-card .preview { font-size: 14px; }
    
    .search-bar select { width: 160px; }
    
    .overlay-box { max-width: 480px; padding: 36px; border-radius: 24px; }
    
    .back-btn { font-size: 16px; }
    .back-btn:hover { color: #6ac4a0; }
    
    .tag { font-size: 12px; padding: 3px 14px; }
    
    .phase-item { padding: 14px 18px; }
    .phase-item .phase-name { font-size: 15px; }
    .phase-item .phase-dates { font-size: 13px; }
    
    .checkin-btn { padding: 16px; font-size: 18px; }
    
    .home-summary-card { cursor: default; }
  

  /* ===== 手机端卡片优化 ===== */
  @media (max-width: 480px) {
    .item-card { width: 100%; max-width: 100%; box-sizing: border-box; overflow-wrap: break-word; word-break: break-word; }
    .item-card .preview { white-space: normal; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .item-card { padding: 10px 12px; border-radius: 12px; overflow: hidden; }
    .item-card h4 { font-size: 14px; }
    .item-card .meta { font-size: 11px; gap: 4px; }
    .item-card .preview { font-size: 12px; }
    .item-card .meta .tag { font-size: 10px; padding: 1px 8px; }
    .detail-card .detail-title { font-size: 16px; }
    .detail-card .detail-meta { font-size: 11px; }
    .detail-card .detail-content { font-size: 13px; }
    .detail-header .detail-back { font-size: 13px; }
    .detail-header .detail-delete { font-size: 12px; }
    .card { padding: 14px; }
    .back-btn, .detail-back { background: #e8f5f0; color: #3d7a5a; padding: 6px 16px; border-radius: 20px; font-size: 13px; display: inline-flex; align-items: center; gap: 4px; margin-bottom: 10px; }
    .back-btn:hover, .detail-back:hover { background: #d4ede2; }
    .detail-delete { background: #ffe8ec; color: #d4707a; padding: 6px 14px; border-radius: 20px; font-size: 12px; display: inline-flex; align-items: center; gap: 4px; }
    .detail-delete:hover { background: #ffd5db; color: #c0505a; }
    .item-grid { gap: 6px; }
    .page { padding: 10px; }
  }

  /* ===== 归档笔记 ===== */
  .item-card.archived { opacity: .5; filter: grayscale(.6); pointer-events: none; }\n.item-card.archived .archive-btn { pointer-events: auto; }
  .item-card.archived .archived-label { display: inline-block; font-size: 10px; background: #d4d4d4; color: #888; padding: 1px 8px; border-radius: 8px; margin-left: 6px; }
  .archive-btn { border: none; background: #e8f5f0; font-family: inherit; font-size: 11px; color: #6a9e92; cursor: pointer; padding: 3px 10px; border-radius: 20px; transition: all .2s; white-space: nowrap; flex-shrink: 0; }
  .archive-btn:hover { background: #d4ede2; color: #4a8a7a; }
  .restore-btn { border: none; background: #e8f5f0; font-family: inherit; font-size: 12px; color: #6a9e92; cursor: pointer; padding: 4px 12px; border-radius: 10px; font-weight: 600; margin-top: 8px; }
  .restore-btn:hover { background: #d4ede2; }
  
  /* ===== 详情卡片 ===== */
  .detail-card { position: relative; }
  .detail-card .detail-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .detail-card .detail-back { border: none; background: none; font-family: inherit; font-size: 14px; color: #89d4b6; cursor: pointer; font-weight: 600; padding: 4px 0; }
  .detail-card .detail-back:hover { color: #6ac4a0; }
  .detail-card .detail-delete { border: none; background: none; font-family: inherit; font-size: 13px; color: #ff9eaa; cursor: pointer; padding: 4px 0; font-weight: 600; }
  .detail-card .detail-delete:hover { color: #ff5252; }
  .detail-card .detail-title { font-size: 18px; font-weight: 700; color: #3d5a5c; margin-bottom: 6px; outline: none; border-bottom: 2px solid transparent; transition: border-color .2s; padding: 4px 0; border-radius: 0; }
  .detail-card .detail-title:focus { border-bottom-color: #89d4b6; }
  .detail-card .detail-content { font-size: 14px; line-height: 1.6; color: #2d3436; white-space: pre-wrap; outline: none; border: 1px solid transparent; border-radius: 8px; padding: 8px; margin: 0 -8px; min-height: 40px; transition: border-color .2s, background .2s; }
  .detail-card .detail-content:focus { border-color: #d4eae3; background: #f8fcfb; }
  .detail-card .detail-meta { font-size: 12px; color: #a0b8b0; margin-bottom: 10px; }
  }

  /* ===== 密码验证 ===== */
  #passwordOverlay { display: flex; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(45,52,54,.6); z-index: 9999; justify-content: center; align-items: center; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
  #passwordOverlay.show { display: flex; }
  .password-box { background: #fff; border-radius: 24px; padding: 40px 32px; width: 88%; max-width: 320px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,.15); }
  .password-box h2 { font-size: 24px; margin-bottom: 4px; background: linear-gradient(135deg, #7ec8e3, #89d4b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .password-box p { font-size: 14px; color: #a0b8b0; margin-bottom: 20px; }
  .password-box input { width: 100%; padding: 12px 16px; border: 2px solid #d4eae3; border-radius: 14px; font-size: 16px; font-family: inherit; text-align: center; outline: none; transition: border-color .2s; }
  .password-box input:focus { border-color: #89d4b6; box-shadow: 0 0 0 3px rgba(137,212,182,.15); }
  .password-box .pw-btn { width: 100%; padding: 12px; border: none; border-radius: 14px; font-size: 16px; font-weight: 700; font-family: inherit; cursor: pointer; margin-top: 12px; background: linear-gradient(135deg, #b8e1f5, #a8e6cf); color: #3d5a5c; transition: all .2s; }
  .password-box .pw-btn:active { transform: scale(.97); }
  #passwordError { color: #ff5252; font-size: 13px; margin-top: 8px; display: none; }

</style>
</head>
<body>
<div id="passwordOverlay">
  <div class="password-box">
    <h2>🦐 虾虾百宝箱</h2>
    <p>请输入密码</p>
    <input type="password" id="passwordInput" placeholder="输入密码" onkeydown="if(event.key==='Enter')checkPassword()">
    <button class="pw-btn" onclick="checkPassword()">✨ 进入</button>
    <div id="passwordError">密码错误，再试一次～</div>
  </div>
</div>


<!-- ==================== 主页 ==================== -->
<div id="page-home" class="page active">
  <div class="home-header">
    <h1>🦐 虾虾百宝箱</h1>
    <p id="homeDate"></p>
  </div>
  <div id="menuGrid" class="menu-grid">
  </div>
  <div style="margin-top:24px">
    <div class="card" style="cursor:default">
      <div class="card-title">📋 今日概况</div>
      <div id="homeSummary" style="font-size:13px;color:#666">加载中…</div>
    </div>
  </div>
</div>

<!-- ==================== 桌面端顶部导航（手机端隐藏） ==================== -->
<div class="desktop-nav">
  <div class="desktop-nav-inner">
    <span class="desktop-nav-brand">🦐 虾虾百宝箱</span>
    <div class="desktop-nav-links">
      <a href="javascript:void(0)" onclick="goPage('home')" class="active">🏠 主页</a>
      <a href="javascript:void(0)" onclick="goPage('schedule')">📅 日程</a>
      <a href="javascript:void(0)" onclick="goPage('countdown')">⏰ 倒计时</a>

    </div>
  </div>
</div>

<!-- ==================== 日程页 ==================== -->
<div id="page-schedule" class="page">
  <button class="back-btn" onclick="goPage('home')">← 返回主页</button>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <h2>📅 日程计划</h2>
    <button class="btn btn-primary btn-sm" onclick="showScheduleForm()">➕ 新建</button>
  </div>
  <div id="scheduleList" class="item-grid"></div>
</div>

<!-- ==================== 灵感页 ==================== -->
<div id="page-idea" class="page">
  <button class="back-btn" onclick="goPage('home')">← 返回主页</button>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <h2>💡 灵感脑洞</h2>
    <button class="btn btn-primary btn-sm" onclick="showIdeaForm()">➕ 新建</button>
  </div>
  <div class="search-bar">
    <input id="ideaSearch" placeholder="搜索灵感…" oninput="renderIdeas()">
    <select id="ideaFilter" onchange="renderIdeas()" style="width:auto;padding:8px">
      <option value="all">全部分类</option>
    </select>
  </div>
  <div id="ideaTagBar" style="margin-bottom:10px;display:flex;flex-wrap:wrap;gap:4px"></div>
  <div id="ideaList" class="item-grid"></div>
</div>

<!-- ==================== 日常记录页 ==================== -->
<div id="page-daily" class="page">
  <button class="back-btn" onclick="goPage('home')">← 返回主页</button>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
    <h2>📋 日常记录</h2>
    <span style="display:flex;gap:6px"><button class="btn btn-danger btn-sm" id="dailyDeleteBtn" onclick="toggleDailyDelete()" style="background:#ffe8ec;color:#d4707a;margin-right:6px">➖ 删除</button><button class="btn btn-primary btn-sm" id="dailyAddBtn" onclick="showDailyForm()">➕ 记录</button></span>
  </div>
  <div id="dailyDate" style="font-size:13px;color:#a0b8b0;margin-bottom:8px"></div>
  <div id="dailyList" class="item-grid"></div>
</div>

<!-- ==================== 笔记页 ==================== -->
<div id="page-note" class="page">
  <button class="back-btn" onclick="goPage('home')">← 返回主页</button>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <h2>📝 笔记</h2>
    <button class="btn btn-primary btn-sm" onclick="showNoteForm()">➕ 新建</button>
  </div>
  <div class="search-bar">
    <input id="noteSearch" placeholder="搜索笔记…" oninput="renderNotes()">
    <select id="noteFilter" onchange="renderNotes()" style="width:auto;padding:8px">
      <option value="all">全部分类</option>
    </select>
  </div>
  <div id="noteTagBar" style="margin-bottom:10px;display:flex;flex-wrap:wrap;gap:4px"></div>
  <div id="noteList" class="item-grid"></div>
</div>

<!-- ==================== 倒计时页 ==================== -->
<div id="page-countdown" class="page">
  <button class="back-btn" onclick="goPage('home')">← 返回主页</button>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <h2>⏰ 倒计时</h2>
    <button class="btn btn-primary btn-sm" onclick="showCountdownForm()">➕ 新建</button>
  </div>
  <div id="countdownStats" style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap"></div>
  <div id="countdownList" class="item-grid"></div>
</div>

<!-- ==================== 备考页 ==================== -->
<div id="page-study" class="page">
  <button class="back-btn" onclick="goPage('home')">← 返回主页</button>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <h2>📚 备考计划</h2>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <button class="back-btn" onclick="studyPrevWeek()" style="font-size:13px">‹ 上周</button>
    <span id="studyWeekLabel" style="font-size:14px;font-weight:700;color:#3d5a5c"></span>
    <button class="back-btn" onclick="studyNextWeek()" style="font-size:13px">下周 ›</button>
  </div>
  <div id="studyStats" style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;font-size:12px"></div>

        <span style="color:${lb.color};font-weight:600;white-space:nowrap">${lb.text}</span>

    }).join('');

async function saveSchedule() {
  const name = document.getElementById('sf_name').value.trim();
  if (!name) { alert('请输入计划名称'); return; }
  const phases = [];
  document.querySelectorAll('#sf_phases > div').forEach(el => {
    const n = el.querySelector('.sf_pname').value.trim();
    const d = parseInt(el.querySelector('.sf_pdays').value);
    if (n && d > 0) phases.push({ name: n, days: d, checkedDays: 0, lastCheckin: '' });
  });
  if (!phases.length) { alert('请至少添加一个阶段'); return; }
  const record = { name, description: document.getElementById('sf_desc').value.trim(), link: document.getElementById('sf_link').value.trim(), phases };
  const { data } = await sb.from('schedules').insert(record).select();
  if (data) { _cache.schedules.push(data[0]); }
  closeOverlay('scheduleForm');
  renderSchedules();
}

function findSchedIdx(id) { return _cache.schedules.findIndex(s => s.id === id); }

async function openScheduleDetail(id) {
  const idx = findSchedIdx(id);
  if (idx === -1) { renderSchedules(); return; }
  const p = _cache.schedules[idx];
  if (!p) return;
  let html = `<button class="back-btn" onclick="renderSchedules()">← 返回</button>`;
  html += `<h2>${esc(p.name)}</h2>`;
  if (p.description) html += `<p style="font-size:13px;color:#666;margin-bottom:8px">${esc(p.description)}</p>`;
  if (p.link) html += `<p style="font-size:12px;margin-bottom:8px">📎 <a href="${esc(p.link)}" target="_blank" style="color:#667eea">查看资料</a></p>`;

  let dayOffset = 0, curIdx = -1;
  const phases = p.phases || [];
  for (let i = 0; i < phases.length; i++) {
    if ((phases[i].checkedDays||0) < (phases[i].days||0)) { curIdx = i; break; }
    dayOffset += (phases[i].days||0);
  }
  const total = phases.reduce((s,ph) => s + (ph.days||0), 0);
  const doneAll = phases.reduce((s,ph) => s + (ph.checkedDays||0), 0);
  const todayChecked = curIdx >= 0 && phases[curIdx].lastCheckin === getToday();

  if (doneAll >= total) {
    html += `<div class="checkin-btn done">🎉 全部完成！</div>`;
  } else {
    html += `<button class="checkin-btn ${todayChecked ? 'done' : 'pending'}" onclick="doSchedCheckin(${p.id})">
      ${todayChecked ? '✅ 今日已打卡' : `📌 今日打卡 · 第${doneAll+1}/${total}天`}
    </button>`;
  }

  html += `<div class="card"><div class="card-title">📊 阶段</div>`;
  phases.forEach((ph, i) => {
    const completed = (ph.checkedDays||0) >= (ph.days||0);
    html += `<div class="phase-item ${completed?'done':''}">
      <div class="phase-info"><div class="phase-name">${esc(ph.name)} ${completed ? '✅' : (i===curIdx?'← 当前':'')}</div>
      <div class="phase-dates">${ph.days||0}天 · 已打卡${ph.checkedDays||0}天</div></div>
    </div>`;
  });
  html += `</div>`;
  html += `<button class="btn btn-danger btn-sm" onclick="if(confirm('删除此计划？')){ deleteSchedule(${p.id}) }" style="width:100%">🗑️ 删除</button>`;

  document.getElementById('scheduleList').innerHTML = html;
}

async function deleteSchedule(id) {
  await sb.from('schedules').delete().eq('id', id);
  const idx = findSchedIdx(id);
  if (idx !== -1) _cache.schedules.splice(idx, 1);
  renderSchedules();
}

async function doSchedCheckin(id) {
  const idx = findSchedIdx(id);
  if (idx === -1) return;
  const p = _cache.schedules[idx];
  const phases = p.phases || [];
  for (let i = 0; i < phases.length; i++) {
    if ((phases[i].checkedDays||0) < (phases[i].days||0)) {
      if (phases[i].lastCheckin === getToday()) { alert('今天已打卡'); return; }
      phases[i].checkedDays = (phases[i].checkedDays||0) + 1;
      phases[i].lastCheckin = getToday();
      p.phases = phases;
      await sb.from('schedules').update({ phases }).eq('id', id);
      openScheduleDetail(id);
      return;
    }
  }
}

function getCdDays(item) {
  const target = new Date(item.target_date);
  const now = new Date();
  const targetDay = new Date(target.getFullYear(), target.getMonth(), target.getDate());
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  return Math.round((targetDay - today) / (1000 * 60 * 60 * 24));
}

function getCdLabel(days) {
  if (days < 0) return { text: `已逾期 ${Math.abs(days)} 天`, cls: 'overdue', color: '#999' };
  if (days === 0) return { text: '🔥 今天截止！', cls: 'urgent', color: '#ff5252' };
  if (days <= 3) return { text: `⏰ 仅剩 ${days} 天`, cls: 'urgent', color: '#ff5252' };
  if (days <= 7) return { text: `⚠️ 剩 ${days} 天`, cls: 'warning', color: '#ff9800' };
  if (days <= 30) return { text: `📆 剩 ${days} 天`, cls: 'normal', color: '#667eea' };
  return { text: `🕊️ 剩 ${days} 天`, cls: 'easy', color: '#4caf50' };
}

function renderCountdownStats() {
  const cds = _cache.countdowns;
  const total = cds.length;
  const done = cds.filter(c => c.done).length;
  const active = total - done;
  const urgent = cds.filter(c => !c.done && getCdDays(c) <= 3 && getCdDays(c) >= 0).length;
  const overdue = cds.filter(c => !c.done && getCdDays(c) < 0).length;
  const el = document.getElementById('countdownStats');
  let html = `<span style="background:#e8f5e9;padding:4px 12px;border-radius:12px;font-size:12px;color:#2e7d32">✅ ${done}个完成</span>`;
  if (active > 0) html += `<span style="background:#e3f2fd;padding:4px 12px;border-radius:12px;font-size:12px;color:#1565c0">⏳ ${active}个进行中</span>`;
  if (urgent > 0) html += `<span style="background:#ffebee;padding:4px 12px;border-radius:12px;font-size:12px;color:#c62828">🔥 ${urgent}个紧急</span>`;
  if (overdue > 0) html += `<span style="background:#f3e5f5;padding:4px 12px;border-radius:12px;font-size:12px;color:#6a1b9a">⚠️ ${overdue}个逾期</span>`;
  el.innerHTML = html;
}

function renderCountdowns() {
  const cds = _cache.countdowns;
  const el = document.getElementById('countdownList');
  renderCountdownStats();
  if (!cds.length) {
    el.innerHTML = '<div class="empty-state"><div class="icon">⏰</div><p>还没有倒计时事项，点「新建」添加一个吧</p></div>';
    return;
  }
  const sorted = [...cds].sort((a, b) => {
    if (a.done && !b.done) return 1;
    if (!a.done && b.done) return -1;
    return getCdDays(a) - getCdDays(b);
  });
  el.innerHTML = sorted.map(item => {
    const days = getCdDays(item);
    const label = getCdLabel(days);
    const pct = item.done ? 100 : (days <= 0 ? 0 : Math.min(100, Math.max(0, 100 - days / 365 * 100)));
    return `<div class="item-card" style="border-left:4px solid ${item.done ? '#4caf50' : label.color}" onclick="showCdDetail(${item.id})">
      <div style="display:flex;justify-content:space-between;align-items:start">

        <span style="font-size:13px;font-weight:600;color:${item.done ? '#4caf50' : label.color};white-space:nowrap">${item.done ? '已完成' : label.text}</span>
      </div>

    </div>`;
  }).join('');

// ==================== 备考模块 ====================
let _studyCurWeek = null;

function getMonday(d) {
  const date = new Date(d);
  const day = date.getDay();
  const diff = date.getDate() - day + (day === 0 ? -6 : 1);
  date.setDate(diff);
  return new Date(date.getFullYear(), date.getMonth(), date.getDate());
}

function fmtDate(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

function getDefaultTasks(wkDay) {
  const isWeekend = wkDay >= 6; // 6=Sat, 0=Sun
  if (isWeekend) {
    return [
      { title: '行测专项3h', duration: 180, done: false },
      { title: '申论精练2h', duration: 120, done: false },
      { title: '模考·复盘2h', duration: 120, done: false },
    ];
  }
  return [
    { title: '行测刷题20min', duration: 20, done: false },
    { title: '时政·申论素材15min', duration: 15, done: false },
  ];
}

function getStudyWeek(weekStart) {
  const ws = weekStart || getMonday(new Date());
  return _cache.studyPlans.find(p => p.week_start === fmtDate(ws));
}

async function ensureStudyWeek(weekStart) {
  const ws = weekStart || getMonday(new Date());
  const wsStr = fmtDate(ws);
  let plan = _cache.studyPlans.find(p => p.week_start === wsStr);
  if (plan) return plan;
  // Create new week
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(ws);
    d.setDate(d.getDate() + i);
    const wkDay = d.getDay(); // 0=Sun, 1=Mon... 6=Sat
    days.push({
      date: fmtDate(d),
      weekday: ['日','一','二','三','四','五','六'][wkDay],
      tasks: getDefaultTasks(wkDay),
      total_min: 0
    });
  }
  const record = { week_start: wsStr, days };
  const { data } = await sb.from('study_plans').insert(record).select();
  if (data) {
    _cache.studyPlans.push(data[0]);
    plan = data[0];
  }
  return plan;
}

function calcDayStats(day) {
  const total = (day.tasks||[]).reduce((s,t) => s + (t.duration||0), 0);
  const done = (day.tasks||[]).filter(t => t.done).length;
  const totalTasks = (day.tasks||[]).length;
  const doneMin = (day.tasks||[]).filter(t => t.done).reduce((s,t) => s + (t.duration||0), 0);
  return { total, done, totalTasks, doneMin, pct: totalTasks > 0 ? Math.round(done/totalTasks*100) : 0 };
}

let _studyDateTarget = null;

async function renderStudy() {
  if (!_studyCurWeek) _studyCurWeek = getMonday(new Date());
  const ws = _studyCurWeek;
  document.getElementById('studyWeekLabel').textContent =
    `${ws.getFullYear()}年${ws.getMonth()+1}月${ws.getDate()}日 周`;
  const plan = await ensureStudyWeek(ws);
  if (!plan) { document.getElementById('studyDays').innerHTML = '<div class="empty-state"><div class="icon">📚</div><p>加载失败</p></div>'; return; }

  const days = plan.days || [];
  const todayStr = fmtDate(new Date());
  const weekTotal = days.reduce((s,d) => s + calcDayStats(d).total, 0);
  const weekDone = days.reduce((s,d) => s + calcDayStats(d).doneMin, 0);
  const weekPct = weekTotal > 0 ? Math.round(weekDone/weekTotal*100) : 0;

  document.getElementById('studyStats').innerHTML =
    `<span style="background:#e8f5f0;padding:4px 12px;border-radius:12px;color:#3d7a5a">📊 本周 ${Math.round(weekTotal/60)}h${weekTotal%60}min</span>` +
    `<span style="background:#e3f2fd;padding:4px 12px;border-radius:12px;color:#3d6a7c">✅ ${Math.round(weekDone/60)}h${weekDone%60}min 已完成</span>` +
    `<span style="background:#fef3e2;padding:4px 12px;border-radius:12px;color:#b8860b">${weekPct}%</span>`;

  const el = document.getElementById('studyDays');
  el.innerHTML = days.map(d => {
    const isToday = d.date === todayStr;
    const stats = calcDayStats(d);
    const isFuture = d.date > todayStr;
    return `<div class="card" style="${isToday ? 'border:2px solid #b8e1f5;' : ''}${isFuture ? 'opacity:.6' : ''}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div><strong>${d.date}</strong> 周${d.weekday} ${isToday ? '📍今天' : ''}</div>
        <span style="font-size:12px;color:#a0b8b0">${stats.done}/${stats.totalTasks} 项 · ${stats.doneMin}/${stats.total}min</span>
      </div>
      ${(d.tasks||[]).map((t, ti) => `
        <div style="display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid #f0f7f4">
          <input type="checkbox" ${t.done ? 'checked' : ''} onchange="studyToggleTask('${d.date}',${ti},this.checked)" style="width:18px;height:18px;accent-color:#89d4b6;cursor:pointer">
          <span style="flex:1;font-size:14px;${t.done ? 'text-decoration:line-through;color:#aabfbb' : ''}">${esc(t.title)}</span>
          <span style="font-size:12px;color:#a0b8b0">${t.duration}min</span>
          <span onclick="studyDeleteTask('${d.date}',${ti})" style="cursor:pointer;color:#ff9eaa;font-size:14px">✕</span>
        </div>
      `).join('')}
      <div style="margin-top:6px">
        <button class="btn btn-sm" onclick="studyShowAddForm('${d.date}')" style="background:#e8f5f0;color:#3d7a5a;font-family:inherit">➕ 添加任务</button>
      </div>
    </div>`;
  }).join('');
}

function studyShowAddForm(date) {
  _studyDateTarget = date;
  document.getElementById('stf_title').value = '';
  document.getElementById('stf_duration').value = 30;
  document.getElementById('studyTaskForm').classList.add('show');
}

async function studyAddTask() {
  const title = document.getElementById('stf_title').value.trim();
  if (!title) { alert('请输入任务名称'); return; }
  const duration = parseInt(document.getElementById('stf_duration').value) || 30;
  const ws = fmtDate(_studyCurWeek);
  const plan = _cache.studyPlans.find(p => p.week_start === ws);
  if (!plan) return;
  const day = plan.days.find(d => d.date === _studyDateTarget);
  if (!day) return;
  day.tasks.push({ title, duration, done: false });
  await sb.from('study_plans').update({ days: plan.days }).eq('id', plan.id);
  closeOverlay('studyTaskForm');
  renderStudy();
}

async function studyToggleTask(date, idx, checked) {
  const ws = fmtDate(_studyCurWeek);
  const plan = _cache.studyPlans.find(p => p.week_start === ws);
  if (!plan) return;
  const day = plan.days.find(d => d.date === date);
  if (!day || !day.tasks[idx]) return;
  day.tasks[idx].done = checked;
  await sb.from('study_plans').update({ days: plan.days }).eq('id', plan.id);
}

async function studyDeleteTask(date, idx) {
  const ws = fmtDate(_studyCurWeek);
  const plan = _cache.studyPlans.find(p => p.week_start === ws);
  if (!plan) return;
  const day = plan.days.find(d => d.date === date);
  if (!day) return;
  day.tasks.splice(idx, 1);
  await sb.from('study_plans').update({ days: plan.days }).eq('id', plan.id);
  renderStudy();
}

function studyPrevWeek() {
  _studyCurWeek.setDate(_studyCurWeek.getDate() - 7);
  renderStudy();
}

function studyNextWeek() {
  _studyCurWeek.setDate(_studyCurWeek.getDate() + 7);
  renderStudy();
}

async function studyResetWeek() {
  if (!confirm('重置本周任务会清空所有进度，确定吗？')) return;
  const ws = fmtDate(_studyCurWeek);
  const plan = _cache.studyPlans.find(p => p.week_start === ws);
  if (!plan) return;
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(_studyCurWeek);
    d.setDate(d.getDate() + i);
    const wkDay = d.getDay();
    days.push({
      date: fmtDate(d),
      weekday: ['日','一','二','三','四','五','六'][wkDay],
      tasks: getDefaultTasks(wkDay),
      total_min: 0
    });
  }
  plan.days = days;
  await sb.from('study_plans').update({ days }).eq('id', plan.id);
  renderStudy();
}


async function archiveNote(id) {
  const idx = findNoteIdx(id);
  if (idx === -1) return;
  await sb.from('notes').update({ archived: true }).eq('id', id);
  _cache.notes[idx].archived = true;
  renderNotes();
}

async function unarchiveNote(id) {
  const idx = findNoteIdx(id);
  if (idx === -1) return;
  await sb.from('notes').update({ archived: false }).eq('id', id);
  _cache.notes[idx].archived = false;
  renderNotes();
}

let _dailyDeleteMode = false;
let _dailySelected = new Set();

function toggleDailyDelete() {
  _dailyDeleteMode = !_dailyDeleteMode;
  _dailySelected.clear();
  const delBtn = document.getElementById('dailyDeleteBtn');
  const addBtn = document.getElementById('dailyAddBtn');
  if (_dailyDeleteMode) {
    delBtn.textContent = '✔ 确认';
    delBtn.style.background = '#ff5252';
    delBtn.style.color = '#fff';
    delBtn.onclick = confirmDailyDelete;
    addBtn.textContent = '✖ 取消';
    addBtn.onclick = toggleDailyDelete;
  } else {
    delBtn.textContent = '➖ 删除';
    delBtn.style.background = '#ffe8ec';
    delBtn.style.color = '#d4707a';
    addBtn.textContent = '➕ 记录';
    addBtn.onclick = showDailyForm;
  }
  renderDailyLogs();
}

function toggleDailySelect(id) {
  if (_dailySelected.has(id)) _dailySelected.delete(id);
  else _dailySelected.add(id);
}

async function confirmDailyDelete() {
  if (_dailySelected.size === 0) { toggleDailyDelete(); return; }
  if (!confirm("确定删除选中的 " + _dailySelected.size + " 条记录？")) return;
  for (const id of _dailySelected) {
    await sb.from('dailylog').delete().eq('id', id);
  }
  _dailyCache = _dailyCache.filter(item => !_dailySelected.has(item.id));
  toggleDailyDelete();
}
// ==================== 工具 ====================
function getToday() { return new Date().toISOString().slice(0,10); }
function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ===== 密码验证 =====
const SITE_PASSWORD = "xiaoxia";
const AUTH_KEY = "xiabaibao_auth";
const AUTH_DURATION = 24 * 60 * 60 * 1000;

function checkAuth() {
  try {
    const auth = localStorage.getItem(AUTH_KEY);
    if (auth) {
      const data = JSON.parse(auth);
      if (data.authed && (Date.now() - data.time) < AUTH_DURATION) return true;
    }
  } catch(e) {}
  return false;
}

function showPasswordOverlay() {
  if (checkAuth()) {
    document.getElementById("passwordOverlay").style.display = "none";
  } else {
    document.getElementById("passwordInput").focus();
  }
}

function checkPassword() {
  const input = document.getElementById("passwordInput").value;
  if (input === SITE_PASSWORD) {
    localStorage.setItem(AUTH_KEY, JSON.stringify({ authed: true, time: Date.now() }));
    document.getElementById("passwordOverlay").style.display = "none";
  } else {
    document.getElementById("passwordError").style.display = "block";
  }
}

// 页面加载时检查密码
showPasswordOverlay();

loadAllData();
