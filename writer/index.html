<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>虾虾写作助手 🦐</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f5f0eb; color: #333; height: 100vh; overflow: hidden; }

/* ===== 密码页 ===== */
#loginOverlay { position: fixed; inset: 0; background: linear-gradient(135deg,#e8f5e9,#c8e6c9); z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column; }
#loginOverlay.hidden { display: none; }
.login-box { background: #fff; border-radius: 20px; padding: 40px; width: 360px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,.1); }
.login-box h1 { font-size: 28px; color: #2e7d32; margin-bottom: 6px; }
.login-box p { color: #888; font-size: 14px; margin-bottom: 24px; }
.login-box input { width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 14px; outline: none; transition: border .2s; }
.login-box input:focus { border-color: #4caf50; }
.login-box .err { color: #e53935; font-size: 13px; margin-top: 10px; display: none; }
.login-box .err.show { display: block; }
.login-box button { margin-top: 16px; width: 100%; padding: 12px; background: #4caf50; color: #fff; border: none; border-radius: 12px; font-size: 16px; cursor: pointer; transition: background .2s; }
.login-box button:hover { background: #388e3c; }

/* ===== 主布局 ===== */
#app { display: none; height: 100vh; }
#app.show { display: flex; }

/* 左栏 - 对话列表 */
.sidebar { width: 240px; min-width: 240px; background: #fff; border-right: 1px solid #e0ddd8; display: flex; flex-direction: column; transition: width .3s,min-width .3s; position: relative; }
.sidebar.collapsed { width: 40px; min-width: 40px; }
.sidebar.collapsed .sidebar-header h2,
.sidebar.collapsed .conv-list,
.sidebar.collapsed .sidebar-header button { display: none; }
.sidebar.collapsed .sidebar-header { justify-content: center; padding: 12px 0; }
.sidebar-header { padding: 16px; border-bottom: 1px solid #e8e5e0; display: flex; align-items: center; justify-content: space-between; }
.sidebar-header h2 { font-size: 16px; color: #2e7d32; white-space: nowrap; }
.sidebar-header .btn-fold { width: 32px; height: 32px; border-radius: 8px; border: 1px solid #e0ddd8; background: #f5f0eb; cursor: pointer; font-size: 14px; line-height: 1; transition: background .2s; display: flex; align-items: center; justify-content: center; }
.sidebar-header .btn-fold:hover { background: #e0ddd8; }
.sidebar-toggle-tab { position: absolute; right: -24px; top: 50%; transform: translateY(-50%); width: 24px; height: 48px; background: #fff; border: 1px solid #e0ddd8; border-left: none; border-radius: 0 8px 8px 0; cursor: pointer; display: none; align-items: center; justify-content: center; font-size: 12px; color: #888; z-index: 10; }
.sidebar.collapsed .sidebar-toggle-tab { display: flex; }
.conv-list { flex: 1; overflow-y: auto; padding: 8px; }
.conv-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 14px; color: #555; margin-bottom: 4px; transition: background .2s; display: flex; align-items: center; justify-content: space-between; gap: 6px; }
.conv-item:hover { background: #f5f0eb; }
.conv-item.active { background: #e8f5e9; color: #2e7d32; font-weight: 600; }
.conv-item .title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.conv-item .active-dot { font-size: 10px; color: #4caf50; flex-shrink: 0; }
.conv-item .unread-badge { background: #e53935; color: #fff; font-size: 11px; font-weight: 600; padding: 1px 7px; border-radius: 10px; line-height: 1.5; flex-shrink: 0; min-width: 20px; text-align: center; }
.conv-item .del-btn { width: 20px; height: 20px; border-radius: 4px; border: none; background: transparent; cursor: pointer; color: #ccc; font-size: 12px; display: none; }
.conv-item:hover .del-btn { display: block; }
.conv-item .del-btn:hover { color: #e53935; background: #ffebee; }

/* 中栏 - 聊天 */
.chat-area { flex: 1; display: flex; flex-direction: column; min-width: 0; background: #faf8f5; }
.chat-header { padding: 12px 20px; border-bottom: 1px solid #e8e5e0; background: #fff; display: flex; align-items: center; justify-content: space-between; }
.chat-header h3 { font-size: 15px; color: #333; }
.chat-header .hint { font-size: 12px; color: #aaa; }
.msg-list { flex: 1; overflow-y: auto; padding: 16px 20px; }
.msg { margin-bottom: 16px; display: flex; }
.msg.assistant { justify-content: flex-start; }
.msg.user { justify-content: flex-end; }
.msg-bubble { max-width: 75%; padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.7; white-space: pre-wrap; word-break: break-word; }
.msg.assistant .msg-bubble { background: #fff; border: 1px solid #e8e5e0; border-bottom-left-radius: 4px; color: #333; }
.msg.user .msg-bubble { background: #4caf50; color: #fff; border-bottom-right-radius: 4px; }
.msg .time { font-size: 11px; color: #aaa; margin-top: 4px; text-align: right; }
.msg.assistant .time { text-align: left; }
.msg-loading .msg-bubble { background: #fff; border: 1px solid #e8e5e0; }
.msg-loading .dots { display: inline-flex; gap: 4px; }
.msg-loading .dots span { width: 6px; height: 6px; border-radius: 50%; background: #bbb; animation: dotPulse 1.4s infinite; }
.msg-loading .dots span:nth-child(2) { animation-delay: .2s; }
.msg-loading .dots span:nth-child(3) { animation-delay: .4s; }
@keyframes dotPulse { 0%,80%,100% { opacity: .3; } 40% { opacity: 1; } }
.chat-input { padding: 12px 20px; border-top: 1px solid #e8e5e0; background: #fff; display: flex; gap: 8px; align-items: flex-end; }
.chat-input textarea { flex: 1; padding: 10px 14px; border: 1px solid #e0ddd8; border-radius: 12px; resize: none; font-size: 14px; outline: none; min-height: 44px; max-height: 120px; font-family: inherit; line-height: 1.5; }
.chat-input textarea:focus { border-color: #4caf50; }
.chat-input .btn-group { display: flex; gap: 6px; }
.chat-input button { padding: 10px 18px; border-radius: 12px; border: none; font-size: 14px; cursor: pointer; white-space: nowrap; transition: background .2s; }
.chat-input .btn-send { background: #4caf50; color: #fff; }
.chat-input .btn-send:hover { background: #388e3c; }
.chat-input .btn-send:disabled { background: #a5d6a7; cursor: not-allowed; }

/* 右栏 - 文件管理 */
.file-panel { width: 280px; min-width: 280px; background: #fff; border-left: 1px solid #e0ddd8; display: flex; flex-direction: column; transition: width .3s,min-width .3s; overflow: hidden; position: relative; }
.file-panel.collapsed { width: 40px; min-width: 40px; }
.file-panel.collapsed .file-header h2,
.file-panel.collapsed .file-header .actions,
.file-panel.collapsed .folder-list,
.file-panel.collapsed .file-list { display: none; }
.file-panel.collapsed .file-header { justify-content: center; padding: 12px 0; }
.file-panel-toggle-tab { position: absolute; right: 0; top: 50%; transform: translateY(-50%); width: 24px; height: 48px; background: #fff; border: 1px solid #e0ddd8; border-right: none; border-radius: 8px 0 0 8px; cursor: pointer; display: none; align-items: center; justify-content: center; font-size: 12px; color: #888; z-index: 10; }
.file-panel.collapsed .file-panel-toggle-tab { display: flex; }
.file-header { padding: 16px; border-bottom: 1px solid #e8e5e0; display: flex; align-items: center; justify-content: space-between; }
.file-header h2 { font-size: 16px; color: #2e7d32; white-space: nowrap; }
.file-header .actions { display: flex; gap: 6px; }
.file-header .actions button { padding: 6px 12px; border-radius: 8px; border: 1px solid #e0ddd8; background: #f5f0eb; cursor: pointer; font-size: 12px; transition: background .2s; }
.file-header .actions button:hover { background: #e0ddd8; }

/* 文件夹列表 */
.folder-list { padding: 8px; border-bottom: 1px solid #e8e5e0; }
.folder-item { padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 13px; color: #555; display: flex; align-items: center; gap: 6px; margin-bottom: 2px; transition: background .2s; }
.folder-item:hover { background: #f5f0eb; }
.folder-item.active { background: #e8f5e9; color: #2e7d32; font-weight: 600; }
.folder-item .count { margin-left: auto; font-size: 11px; color: #aaa; }
.folder-item .del-folder { font-size: 12px; color: #ccc; cursor: pointer; display: none; padding: 0 4px; }
.folder-item:hover .del-folder { display: inline; }
.folder-item .del-folder:hover { color: #e53935; }
/* ===== 树状文件管理 ===== */
.tree-empty { text-align:center; color:#aaa; padding:20px; font-size:13px; }
.tree-folder { border-bottom:1px solid #f0f0f0; }
.tree-folder-header { padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 13px; color: #555; display: flex; align-items: center; gap: 6px; transition: background .2s; user-select: none; }
.tree-folder-header:hover { background: #f5f0eb; }
.tree-folder-header .arrow { width: 16px; text-align: center; font-size: 10px; color: #aaa; flex-shrink: 0; }
.tree-folder-header .f-icon { flex-shrink: 0; }
.tree-folder-header .fname { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tree-folder-header .fcount { font-size: 11px; color: #aaa; margin-right: 4px; }
.tree-folder-header .del-folder { font-size: 12px; color: #ccc; cursor: pointer; display: none; padding: 0 4px; }
.tree-folder-header:hover .del-folder { display: inline; }
.tree-folder-header .del-folder:hover { color: #e53935; }
.tree-folder-children { }
.tree-file { padding: 6px 10px 6px 32px; border-radius: 6px; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 6px; transition: background .2s; }
.tree-file:hover { background: #f5f0eb; }
.tree-file .fname { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tree-file .fsize { font-size: 11px; color: #aaa; white-space: nowrap; }
.tree-file .fops { display: none; gap: 4px; }
.tree-file:hover .fops { display: flex; }
.tree-file .fops button { padding: 2px 6px; border-radius: 4px; border: none; background: transparent; cursor: pointer; font-size: 12px; color: #888; }
.tree-file .fops button:hover { background: #e8e5e0; color: #333; }
.tree-root-divider { height: 1px; background: #e8e5e0; margin: 4px 0; }

/* ===== 树底操作栏 ===== */
.tree-actions { border-top: 1px solid #e8e5e0; padding: 6px 8px; }
.tree-action { padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 13px; color: #4caf50; display: flex; align-items: center; gap: 6px; transition: background .2s; }
.tree-action:hover { background: #e8f5e9; }

/* 文件列表 */
.file-list { flex: 1; overflow-y: auto; padding: 8px; }
.file-item { padding: 8px 10px; border-radius: 6px; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 6px; margin-bottom: 2px; transition: background .2s; }
.file-item:hover { background: #f5f0eb; }
.file-item .fname { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-item .fsize { font-size: 11px; color: #aaa; white-space: nowrap; }
.file-item .fops { display: none; gap: 4px; }
.file-item:hover .fops { display: flex; }
.file-item .fops button { padding: 2px 6px; border-radius: 4px; border: none; background: transparent; cursor: pointer; font-size: 12px; color: #888; }
.file-item .fops button:hover { background: #e8e5e0; color: #333; }

/* 文件预览弹窗 */
#filePreview { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 1000; display: none; justify-content: center; align-items: center; }
#filePreview.show { display: flex; }
.preview-box { background: #fff; border-radius: 16px; width: 90%; max-width: 700px; max-height: 85vh; display: flex; flex-direction: column; box-shadow: 0 10px 40px rgba(0,0,0,.2); }
.preview-header { padding: 16px 20px; border-bottom: 1px solid #e8e5e0; display: flex; align-items: center; justify-content: space-between; }
.preview-header h3 { font-size: 16px; color: #333; }
.preview-header .close-preview { width: 32px; height: 32px; border-radius: 8px; border: none; background: transparent; cursor: pointer; font-size: 20px; }
.preview-header .close-preview:hover { background: #f5f0eb; }
.preview-body { flex: 1; padding: 20px; overflow-y: auto; font-size: 14px; line-height: 1.8; }
.preview-body h1, .preview-body h2, .preview-body h3, .preview-body h4 { margin: 1em 0 .5em; color: #2e7d32; }
.preview-body h1 { font-size: 22px; }
.preview-body h2 { font-size: 19px; }
.preview-body h3 { font-size: 16px; }
.preview-body p { margin: .6em 0; }
.preview-body ul, .preview-body ol { padding-left: 1.5em; margin: .6em 0; }
.preview-body li { margin: .3em 0; }
.preview-body blockquote { border-left: 4px solid #4caf50; padding: .3em 1em; margin: .8em 0; background: #f9fdf9; color: #555; border-radius: 0 6px 6px 0; }
.preview-body code { background: #f0f0f0; padding: 2px 6px; border-radius: 4px; font-size: 13px; font-family: 'Consolas','Courier New',monospace; }
.preview-body pre { background: #2d2d2d; color: #f8f8f2; padding: 14px 18px; border-radius: 8px; overflow-x: auto; margin: .8em 0; }
.preview-body pre code { background: transparent; color: inherit; padding: 0; font-size: 13px; }
.preview-body hr { border: none; border-top: 2px solid #e8e5e0; margin: 1.2em 0; }
.preview-body table { border-collapse: collapse; margin: .8em 0; width: 100%; }
.preview-body th, .preview-body td { border: 1px solid #ddd; padding: 8px 12px; text-align: left; }
.preview-body th { background: #e8f5e9; font-weight: 600; }
.preview-body strong { color: #2e7d32; }
.preview-body img { max-width: 100%; border-radius: 8px; margin: .8em 0; }
/* txt 纯文本样式 */
.preview-body.txt-preview { font-family: 'Consolas','Courier New',monospace; font-size: 13px; line-height: 1.6; white-space: pre-wrap; word-break: break-all; }
.preview-actions { padding: 12px 20px; border-top: 1px solid #e8e5e0; display: flex; gap: 8px; justify-content: flex-end; }
.preview-actions button { padding: 8px 16px; border-radius: 8px; border: none; font-size: 13px; cursor: pointer; transition: background .2s; }
.preview-actions .btn-download { background: #4caf50; color: #fff; }
.preview-actions .btn-download:hover { background: #388e3c; }
.preview-actions .btn-ai { background: #2196f3; color: #fff; }
.preview-actions .btn-ai:hover { background: #1976d2; }
.preview-actions .btn-edit { background: #ff9800; color: #fff; }
.preview-actions .btn-edit:hover { background: #f57c00; }
.preview-actions .btn-save-edit { background: #4caf50; color: #fff; }
.preview-actions .btn-save-edit:hover { background: #388e3c; }
.preview-actions .btn-cancel-edit { background: #f5f0eb; color: #555; }
.preview-actions .btn-cancel-edit:hover { background: #e0ddd8; }
.preview-edit-textarea { width: 100%; min-height: 300px; padding: 14px; border: 2px solid #4caf50; border-radius: 10px; font-size: 14px; font-family: 'Consolas','Courier New',monospace; line-height: 1.7; resize: vertical; outline: none; }
.preview-edit-textarea:focus { border-color: #2e7d32; box-shadow: 0 0 0 3px rgba(76,175,80,.15); }

/* 引用标签栏 */
.quote-bar { display: none; padding: 8px 20px; background: #e8f5e9; border-bottom: 1px solid #c8e6c9; align-items: center; gap: 8px; font-size: 13px; }
.quote-bar.show { display: flex; }
.quote-bar .q-icon { font-size: 16px; flex-shrink: 0; }
.quote-bar .q-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #2e7d32; }
.quote-bar .q-text span { font-weight: 600; }
.quote-bar .q-close { width: 24px; height: 24px; border-radius: 6px; border: none; background: transparent; cursor: pointer; font-size: 14px; color: #888; flex-shrink: 0; }
.quote-bar .q-close:hover { background: #c8e6c9; color: #333; }

/* 上传进度 */
#uploadProgress { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #fff; border-radius: 12px; padding: 16px 24px; box-shadow: 0 4px 20px rgba(0,0,0,.15); display: none; z-index: 1100; min-width: 300px; }

/* 新建文件对话框 */
#newFileOverlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 1000; display: none; justify-content: center; align-items: center; }
#newFileOverlay.show { display: flex; }
.nf-box { background: #fff; border-radius: 16px; width: 90%; max-width: 600px; max-height: 85vh; display: flex; flex-direction: column; box-shadow: 0 10px 40px rgba(0,0,0,.2); }
.nf-header { padding: 16px 20px; border-bottom: 1px solid #e8e5e0; display: flex; align-items: center; justify-content: space-between; }
.nf-header h3 { font-size: 16px; color: #333; }
.nf-close { width: 32px; height: 32px; border-radius: 8px; border: none; background: transparent; cursor: pointer; font-size: 20px; }
.nf-close:hover { background: #f5f0eb; }
.nf-body { padding: 20px; flex: 1; overflow-y: auto; }
.nf-body label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; font-weight: 600; }
.nf-body input[type="text"] { width: 100%; padding: 10px 14px; border: 1px solid #e0ddd8; border-radius: 10px; font-size: 14px; outline: none; margin-bottom: 16px; transition: border .2s; font-family: inherit; }
.nf-body input[type="text"]:focus { border-color: #4caf50; }
.nf-body textarea { width: 100%; padding: 10px 14px; border: 1px solid #e0ddd8; border-radius: 10px; font-size: 14px; outline: none; resize: vertical; min-height: 200px; font-family: inherit; line-height: 1.6; transition: border .2s; }
.nf-body textarea:focus { border-color: #4caf50; }
.nf-actions { padding: 12px 20px; border-top: 1px solid #e8e5e0; display: flex; gap: 8px; justify-content: flex-end; }
.nf-actions button { padding: 8px 20px; border-radius: 8px; border: none; font-size: 14px; cursor: pointer; transition: background .2s; }
.nf-actions .btn-save { background: #4caf50; color: #fff; }
.nf-actions .btn-save:hover { background: #388e3c; }
.nf-actions .btn-cancel { background: #f5f0eb; color: #555; }
.nf-actions .btn-cancel:hover { background: #e0ddd8; }
#uploadProgress.show { display: block; }
#uploadProgress .up-title { font-size: 13px; color: #555; margin-bottom: 8px; }
#uploadProgress .up-bar { height: 6px; background: #e8e5e0; border-radius: 3px; overflow: hidden; }
#uploadProgress .up-bar div { height: 100%; background: #4caf50; border-radius: 3px; transition: width .3s; }
#uploadProgress .up-text { font-size: 12px; color: #888; margin-top: 6px; text-align: center; }

/* ===== 响应式 ===== */
@media (max-width: 900px) {
  .file-panel { display: none; }
  .file-panel.show { display: flex; position: fixed; right: 0; top: 0; height: 100vh; width: 300px; z-index: 500; box-shadow: -4px 0 20px rgba(0,0,0,.1); }
}
@media (max-width: 640px) {
  .sidebar { width: 180px; min-width: 180px; }
  .chat-area { flex: 1; }
  .chat-input { flex-wrap: wrap; }
  .chat-input textarea { min-width: 100%; }
  .chat-input .btn-group { width: 100%; justify-content: flex-end; }
}

/* 滚动条美化 */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #bbb; }
</style>
</head>
<body>

<!-- ===== 密码登录 ===== -->
<div id="loginOverlay">
  <div class="login-box">
    <h1>🦐 虾虾写作助手</h1>
    <p>给妈妈的专属 AI 写作小帮手</p>
    <input type="password" id="loginPwd" placeholder="密码" autocomplete="off" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="err" id="loginErr">密码不对，再试试吧</div>
    <button onclick="doLogin()">进入 ✨</button>
  </div>
</div>

<!-- ===== 主应用 ===== -->
<div id="app">

  <!-- 左栏：对话列表 -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>🦐 对话</h2>
      <div style="display:flex;gap:4px">
        <button class="btn-fold" onclick="toggleSidebar()" title="折叠侧栏">◀</button>
        <button class="btn-fold" onclick="newConversation()" title="新建对话">＋</button>
      </div>
    </div>
    <div class="sidebar-toggle-tab" onclick="toggleSidebar()">▶</div>
    <div class="conv-list" id="convList"></div>
  </div>

  <!-- 中栏：聊天 -->
  <div class="chat-area">
    <div class="chat-header">
      <h3 id="chatTitle">选择或新建一个对话</h3>
      <span class="hint">💡 选中文件可续写/扩写</span>
    </div>
    <div class="msg-list" id="msgList"></div>
    <!-- 引用标签栏 -->
    <div class="quote-bar" id="quoteBar">
      <span class="q-icon">📎</span>
      <span class="q-text">已引用：<span id="quoteFileName"></span></span>
      <button class="q-close" onclick="removeQuote()">✕</button>
    </div>
    <div class="chat-input">
      <textarea id="chatInput" placeholder="输入你的想法..." rows="1" oninput="autoResize(this)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
      <div class="btn-group">
        <button class="btn-send" id="btnSend" onclick="sendMessage()">发送</button>
      </div>
    </div>
  </div>

  <!-- 右栏：文件管理 -->
  <div class="file-panel" id="filePanel">
    <div class="file-header">
      <h2>📁 文件</h2>
      <div class="actions">
        <button class="btn-fold" onclick="toggleFilePanel()" title="折叠文件面板">▶</button>

<script>
// ==================== 配置 ====================
const PASSWORD = 'xiaoxia';

const SUPABASE_URL = 'https://bxmdfgivaqqpxtjilxnj.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ4bWRmZ2l2YXFxcHh0amlseG5qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3MjY3NjMsImV4cCI6MjA5NTMwMjc2M30.VUbG7bnXzNeaIfTT5PsSpPIy__IEONbZBHLRen3iDPY';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ==================== 状态 ====================
let conversations = [];
let currentConvId = null;
let folders = [];
let files = [];
let previewFile = null;
let quoteFile = null;
let isSending = false;
let unreadCounts = {};
let isEditing = false; // 文件编辑模式

// ===== 侧栏折叠 =====
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('collapsed');
}
function toggleFilePanel() {

}

// ===== 密码登录 =====
function doLogin() {

// ===== 初始化 =====
async function init() {
  await loadConversations();
  await loadFolders();
  await loadFiles();
  startGlobalWatch();

    selectConversation(conversations[0].id);

// ==================== 对话管理 ====================
async function loadConversations() {
  const { data } = await sb.from('writer_conversations').select('*').order('updated_at', { ascending: false });
  conversations = data || [];
  renderConversations();
}

function renderConversations() {
  const el = document.getElementById('convList');
  el.innerHTML = conversations.map(c => {
    const isActive = c.id === currentConvId;
    const unread = unreadCounts[c.id] || 0;
    return `
    <div class="conv-item${isActive ? ' active' : ''}" onclick="selectConversation(${c.id})">
      ${isActive ? '<span class="active-dot">●</span>' : ''}
      <span class="title">${escHtml(c.title)}</span>
      ${unread > 0 ? `<span class="unread-badge">${unread > 99 ? '99+' : unread}</span>` : ''}
      <button class="del-btn" onclick="event.stopPropagation();deleteConversation(${c.id})">✕</button>
    </div>`;
  }).join('');
}

async function newConversation() {
  const { data } = await sb.from('writer_conversations').insert({ title: '新对话' }).select().single();
  if (data) {
    conversations.unshift(data);
    selectConversation(data.id);
  }
}

async function selectConversation(id) {
  currentConvId = id;
  unreadCounts[id] = 0;
  renderConversations();
  await loadMessages(id);
  const conv = conversations.find(c => c.id === id);
  document.getElementById('chatTitle').textContent = conv ? conv.title : '对话';
}

async function deleteConversation(id) {
  if (!confirm('确定删除这个对话吗？')) return;
  await sb.from('writer_messages').delete().eq('conversation_id', id);
  await sb.from('writer_conversations').delete().eq('id', id);
  conversations = conversations.filter(c => c.id !== id);
  if (currentConvId === id) {
    currentConvId = conversations.length > 0 ? conversations[0].id : null;
    if (currentConvId) {
      selectConversation(currentConvId);
    } else {
      document.getElementById('msgList').innerHTML = '<div style="text-align:center;color:#aaa;padding:40px;font-size:14px">选择一个对话开始吧 📝</div>';
      document.getElementById('chatTitle').textContent = '选择或新建一个对话';
    }
  } else {
    renderConversations();
  }
}

// ==================== 消息管理 ====================
async function loadMessages(convId) {
  if (!convId) return;
  // 加载用户消息 + 已处理的虾虾回复
  const { data: userMsgs } = await sb.from('writer_messages').select('*').eq('conversation_id', convId).eq('role', 'user').order('created_at', { ascending: true });
  const { data: assistantMsgs } = await sb.from('writer_messages').select('*').eq('conversation_id', convId).eq('role', 'assistant').eq('axia_handled', true).order('created_at', { ascending: true });
  // 合并消息
  const allMsgs = [...(userMsgs || []), ...(assistantMsgs || [])].sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
  renderMessages(allMsgs);
}

function renderMessages(msgs) {
  const el = document.getElementById('msgList');
  if (msgs.length === 0) {
    el.innerHTML = '<div style="text-align:center;color:#aaa;padding:40px;font-size:14px">开始对话吧！聊一聊您的小说 📖</div>';
    return;
  }
  el.innerHTML = msgs.map(m => `
    <div class="msg ${m.role}">
      <div class="msg-bubble">${escHtml(m.content)}</div>
    </div>
  `).join('');
  el.scrollTop = el.scrollHeight;
}

// ==================== AI 对话 ====================
async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || isSending) return;

  // 如果有引用文件，发简短引用标记
  let finalText = text;
  if (quoteFile) {
    finalText = `📎 引用「${quoteFile.name}」(ID:${quoteFile.id})\n\n${text}`;
    removeQuote();
  }

  // 如果没选对话，自动新建
  if (!currentConvId) {
    await newConversation();
    if (!currentConvId) return;
  }

  isSending = true;
  document.getElementById('btnSend').disabled = true;
  input.value = '';
  input.style.height = 'auto';

  // ★ 修复1：立即显示用户消息（乐观渲染）
  const msgList = document.getElementById('msgList');
  // 清除"选择对话"占位提示
  if (msgList.children.length === 1 && msgList.children[0].tagName === 'DIV') {
    msgList.innerHTML = '';
  }
  const userMsgDiv = document.createElement('div');
  userMsgDiv.className = 'msg user';
  userMsgDiv.innerHTML = `<div class="msg-bubble">${escHtml(finalText)}</div>`;
  msgList.appendChild(userMsgDiv);
  msgList.scrollTop = msgList.scrollHeight;

  // 保存用户消息到数据库
  await sb.from('writer_messages').insert({ conversation_id: currentConvId, role: 'user', content: finalText, axia_handled: false });

  // 更新对话标题
  const conv = conversations.find(c => c.id === currentConvId);
  if (conv && conv.title === '新对话') {
    const newTitle = finalText.length > 20 ? finalText.slice(0, 20) + '...' : finalText;
    await sb.from('writer_conversations').update({ title: newTitle }).eq('id', currentConvId);
    conv.title = newTitle;
    document.getElementById('chatTitle').textContent = newTitle;
    renderConversations();
  }

  // 显示等待虾虾回复的动画
  const loadingDiv = document.createElement('div');
  loadingDiv.className = 'msg assistant msg-loading';
  loadingDiv.id = 'axiaLoading';
  loadingDiv.innerHTML = `<div class="msg-bubble"><div class="dots"><span></span><span></span><span></span></div></div>`;
  msgList.appendChild(loadingDiv);
  msgList.scrollTop = msgList.scrollHeight;

  // 更新更新时间
  await sb.from('writer_conversations').update({ updated_at: new Date().toISOString() }).eq('id', currentConvId);

  // ★ 修复2：启动监听前先清理旧的定时器
  startWatchingForReply(currentConvId);

  isSending = false;
  document.getElementById('btnSend').disabled = false;
}

// ===== 双通道监听回复（修复版） =====
let watchTimer = null;
let watchConvId = null;
let pollAttempts = 0;

function startWatchingForReply(convId) {
  // 清理旧轮询
  if (watchTimer) { clearTimeout(watchTimer); watchTimer = null; }
  pollAttempts = 0;
  watchConvId = convId;

  // 1. Realtime 订阅（先取消旧的）
  if (window._realtimeSub) {
    sb.removeChannel(window._realtimeSub);
    window._realtimeSub = null;
  }
  window._realtimeSub = sb.channel(`writer-reply-${convId}`)
    .on('postgres_changes',
      { event: 'INSERT', schema: 'public', table: 'writer_messages',
        filter: `conversation_id=eq.${convId}` },
      async (payload) => {
        const msg = payload.new;
        if (msg.role === 'assistant' && msg.axia_handled === true) {
          onReplyReceived(convId);
        }
      }
    )
    .subscribe();

  // 2. 立即开始轮询
  pollForReply(convId);
}

function onReplyReceived(convId) {
  clearTimeout(watchTimer); watchTimer = null;
  watchConvId = null;
  const loading = document.getElementById('axiaLoading');
  if (loading) loading.remove();
  // 如果当前正在看这个对话，加载消息
  if (convId === currentConvId) {
    loadMessages(convId);
  } else {
    // 否则计为未读，不切过去
    if (!unreadCounts[convId]) unreadCounts[convId] = 0;
    unreadCounts[convId]++;
    renderConversations();
  }
}

// ===== 全局监听：所有对话的新回复 =====
function startGlobalWatch() {
  if (window._globalSub) return;
  window._globalSub = sb.channel('writer-global-all')
    .on('postgres_changes',
      { event: 'INSERT', schema: 'public', table: 'writer_messages',
        filter: 'axia_handled=eq.true' },
      (payload) => {
        const msg = payload.new;
        if (msg.role !== 'assistant') return;
        // 如果正在看的对话已经有回复，跳过（由本地 watch 处理）
        if (msg.conversation_id === currentConvId) return;
        // 其他对话的新回复，计未读
        if (!unreadCounts[msg.conversation_id]) unreadCounts[msg.conversation_id] = 0;
        unreadCounts[msg.conversation_id]++;
        renderConversations();
      }
    )
    .subscribe();
}

function pollForReply(convId) {
  // 如果已经收到回复了就不继续
  if (!watchTimer && watchConvId === null) return;

  if (pollAttempts++ > 60) { // 180秒超时
    const loading = document.getElementById('axiaLoading');
    if (loading) {
      loading.className = 'msg assistant';
      loading.innerHTML = '<div class="msg-bubble" style="color:#999">🌙 阿夏好像睡着了...让楠楠去叫阿夏起床吧！' +
        '<br><button onclick="wakeAxia()" style="margin-top:8px;padding:6px 14px;border-radius:8px;border:1px solid #e0ddd8;background:#f5f0eb;cursor:pointer;font-size:13px">🔔 叫醒阿夏</button></div>';
    }
    watchTimer = null;
    watchConvId = null;
    return;
  }

  sb.from('writer_messages')
    .select('id,role,content,created_at')
    .eq('conversation_id', convId)
    .eq('role', 'assistant')
    .eq('axia_handled', true)
    .order('created_at', { ascending: false })
    .limit(1)
    .then(({ data, error }) => {
      if (error) {
        // 请求失败，3秒后重试
        watchTimer = setTimeout(() => pollForReply(convId), 3000);
        return;
      }
      if (data && data.length > 0) {
        onReplyReceived(convId);
      } else {
        watchTimer = setTimeout(() => pollForReply(convId), 3000);
      }
    })
    .catch(() => {
      // 网络错误等，继续轮询
      watchTimer = setTimeout(() => pollForReply(convId), 3000);
    });
}

// ===== 呼叫阿夏（通过写作助手消息触发 Edge Function） =====
async function callAxia() {
  const btn = event?.target;
  if (btn) { btn.textContent = '⏳ 呼叫中...'; btn.style.pointerEvents = 'none'; }

    const convId = currentConvId || 1;
    await sb.from('writer_messages').insert({
      conversation_id: convId,
      role: 'user',
      content: '📞 呼叫阿夏！妈妈在写作助手上找阿夏～',
      axia_handled: false
    });
    // 弹出提示
    const el = document.getElementById('axiaLoading');
    if (el) {
      el.innerHTML = '<div class="msg-bubble" style="color:#89d4b6;text-align:center">🦐 呼叫已发送！阿夏马上就来～<br><span style="font-size:12px">等一小会儿刷新就能看到回复了 ✨</span></div>';
      setTimeout(() => { el.innerHTML = ''; }, 5000);
    }

}

// ===== 旧版叫醒阿夏（保留兼容） =====
async function wakeAxia() {
  const loading = document.getElementById('axiaLoading');
  if (loading) {
    loading.innerHTML = '<div class="msg-bubble" style="color:#666;text-align:center">📢 正在呼叫阿夏...<br><span style="font-size:12px;color:#999">楠楠看到会来叫我的！</span></div>';
  }
  // 在 Supabase dailylog 留一条记录
  try {
    await sb.from('dailylog').insert({

      content: '📢 写作助手上妈妈呼叫阿夏起床！',

    // 静默失败
  }
}

// ==================== 文件管理 ====================
async function loadFolders() {
  const { data } = await sb.from('writer_folders').select('*').order('created_at', { ascending: true });
  folders = data || [];
  renderFileTree();
}

async function loadFiles() {
  const { data } = await sb.from('writer_files').select('*').order('created_at', { ascending: false });
  files = data || [];
  renderFileTree();
}

// ===== 树状展开状态 =====
let expandedFolders = new Set();

function toggleFolder(id) {
  if (expandedFolders.has(id)) {
    expandedFolders.delete(id);
  } else {
    expandedFolders.add(id);
  }
  renderFileTree();
}

function renderFileTree() {
  const el = document.getElementById('fileTree');
  
  // 根目录文件（无文件夹，排除软删除的）
  const rootFiles = files.filter(f => f.folder_id === null && !f.name.startsWith(DEL_PREFIX));
  
  // 无内容
  if (rootFiles.length === 0 && folders.length === 0) {
    el.innerHTML = '<div class="tree-empty">还没有文件 📭</div>';
    return;
  }
  
  let html = '';
  
  // 渲染根目录文件
  rootFiles.forEach(f => {
    html += renderTreeFileItem(f);
  });
  
  // 根目录文件和文件夹之间的分隔线
  if (rootFiles.length > 0 && folders.length > 0) {
    html += '<div class="tree-root-divider"></div>';
  }
  
  // 渲染文件夹（含内部文件）
  folders.forEach(folder => {
    const isExpanded = expandedFolders.has(folder.id);
    const folderFiles = files.filter(f => f.folder_id === folder.id && !f.name.startsWith(DEL_PREFIX));
    
    html += `<div class="tree-folder">
      <div class="tree-folder-header" onclick="toggleFolder(${folder.id})">
        <span class="arrow">${isExpanded ? '▼' : '▶'}</span>
        <span class="f-icon">📁</span>
        <span class="fname">${escHtml(folder.name)}</span>
        <span class="fcount">${folderFiles.length}</span>
        <span class="del-folder" onclick="event.stopPropagation();deleteFolder(${folder.id})">✕</span>
      </div>`;
    
    if (isExpanded) {
      html += '<div class="tree-folder-children">';
      if (folderFiles.length === 0) {
        html += '<div class="tree-empty" style="padding:8px 10px 8px 32px;font-size:12px">空文件夹</div>';
      } else {
        folderFiles.forEach(f => {
          html += renderTreeFileItem(f);
        });
      }
      html += '</div>';
    }
    
    html += '</div>';
  });
  
  // 操作栏
  html += '<div class="tree-actions">';
  html += '<div class="tree-action" onclick="showNewFolder()">＋ 新建文件夹</div>';
  html += '<div class="tree-action" onclick="showNewFile()">＋ 新建文件</div>';
  html += '<div class="tree-action" onclick="uploadFile()">📤 上传文件</div>';
  html += '<div class="tree-action" onclick="toggleTrash()">🗑️ ' + (showTrashView ? '关闭回收站' : '回收站') + '</div>';
  html += '<div class="tree-action" onclick="refreshFiles()">🔄 刷新文件</div>';
  html += '<div class="tree-action" onclick="callAxia()" style="background:#fef3e2;color:#b8860b;font-weight:700">🦐 呼叫阿夏</div>';
  html += '</div>';
  
  el.innerHTML = html;
}

function renderTreeFileItem(f) {
  return `<div class="tree-file" onclick="previewFileById(${f.id})">
    <span>📄</span>
    <span class="fname">${escHtml(f.name)}</span>
    <span class="fsize">${formatSize(f.size)}</span>
    <span class="fops">
      <button onclick="event.stopPropagation();deleteFile(${f.id})" title="删除">🗑️</button>
    </span>
  </div>`;
}

function showNewFolder() {
  const name = prompt('输入文件夹名称：');
  if (name && name.trim()) {
    createFolder(name.trim());
  }
}

async function createFolder(name) {
  const { data } = await sb.from('writer_folders').insert({ name }).select().single();
  if (data) {
    folders.push(data);
    expandedFolders.add(data.id);
    renderFileTree();
  }
}

// ===== 新建文件 =====
function showNewFile() {
  document.getElementById('nf_name').value = '';
  document.getElementById('nf_content').value = '';
  document.getElementById('newFileOverlay').classList.add('show');
  setTimeout(() => document.getElementById('nf_name').focus(), 100);
}

function closeNewFileDialog() {
  document.getElementById('newFileOverlay').classList.remove('show');
}

function saveNewFileFromDialog() {
  const name = document.getElementById('nf_name').value.trim();
  const content = document.getElementById('nf_content').value;
  if (!name) { alert('请输入文件名～'); document.getElementById('nf_name').focus(); return; }
  closeNewFileDialog();
  createNewFile(name.trim() + '.txt', content || '', null);
}

async function createNewFile(name, content, folderId) {
  const { data } = await sb.from('writer_files').insert({
    folder_id: folderId,
    name: name,
    content: content,
    size: content.length
  }).select().single();
  if (data) {
    files.unshift(data);
    renderFileTree();
  }
}

async function deleteFolder(id) {
  if (!confirm('删除文件夹不会删除其中的文件。确定删除吗？')) return;
  await sb.from('writer_folders').delete().eq('id', id);
  folders = folders.filter(f => f.id !== id);
  renderFileTree();
}

async function refreshFiles() {
  await loadFolders();
  await loadFiles();
}

// ===== 文件上传（含断点续传） =====
function uploadFile() {
  document.getElementById('fileInput').click();
}

async function handleFileSelect(event) {
  const file = event.target.files[0];
  if (!file) return;
  event.target.value = '';

  // 只接受文本文件
  if (!file.name.endsWith('.txt') && !file.name.endsWith('.md')) {
    alert('目前只支持 .txt 和 .md 文件哦～');
    return;
  }

  // 小文件直接上传
  if (file.size <= 500 * 1024) {
    await uploadSmallFile(file);
    return;
  }

  // 大文件分片上传
  await uploadLargeFile(file);
}

async function uploadSmallFile(file) {
  const text = await file.text();
  const { data } = await sb.from('writer_files').insert({
    folder_id: null,
    name: file.name,
    content: text,
    size: text.length
  }).select().single();

  if (data) {
    files.unshift(data);
    renderFileTree();
  }
}

async function uploadLargeFile(file) {
  // 检查是否已有同名文件（断点续传）
  const query = sb.from('writer_files').select('id').eq('name', file.name).is('folder_id', null);
  const { data: existing } = await query.limit(1);

  let fileId;
  if (existing && existing.length > 0) {
    fileId = existing[0].id;
    // 获取已上传的分片
    const { data: chunks } = await sb.from('writer_file_chunks').select('chunk_index').eq('file_id', fileId);
    const uploadedChunks = new Set((chunks || []).map(c => c.chunk_index));
    await uploadChunks(file, fileId, uploadedChunks, true);
  } else {
    // 新建文件记录
    const { data: newFile } = await sb.from('writer_files').insert({
      folder_id: null,
      name: file.name,
      content: '',
      size: file.size
    }).select().single();
    if (!newFile) return;
    fileId = newFile.id;
    await uploadChunks(file, fileId, new Set(), false);
  }
}

async function uploadChunks(file, fileId, uploadedChunks, isResume) {
  const CHUNK_SIZE = 100 * 1024; // 100KB per chunk
  const totalChunks = Math.ceil(file.size / CHUNK_SIZE);

  // 显示进度条
  const progressBar = document.getElementById('uploadProgress');
  const barInner = document.getElementById('upBarInner');
  const upText = document.getElementById('upText');
  const upTitle = document.getElementById('upTitle');
  progressBar.classList.add('show');

  let completed = uploadedChunks.size;
  upTitle.textContent = isResume ? `正在续传 ${file.name}...` : `正在上传 ${file.name}...`;
  updateProgress(barInner, upText, completed, totalChunks);

  for (let i = 0; i < totalChunks; i++) {
    if (uploadedChunks.has(i)) continue;

    const start = i * CHUNK_SIZE;
    const end = Math.min(start + CHUNK_SIZE, file.size);
    const blob = file.slice(start, end);
    const text = await blob.text();

    try {
      await sb.from('writer_file_chunks').insert({
        file_id: fileId,
        chunk_index: i,
        content: text
      });
    } catch (e) {
      // 可能重复插入（并发问题），忽略
    }

    completed++;
    updateProgress(barInner, upText, completed, totalChunks);
  }

  // 合并所有分片到文件内容
  const { data: allChunks } = await sb.from('writer_file_chunks')
    .select('content')
    .eq('file_id', fileId)
    .order('chunk_index', { ascending: true });

  const fullContent = (allChunks || []).map(c => c.content).join('');

  await sb.from('writer_files').update({
    content: fullContent,
    size: fullContent.length
  }).eq('id', fileId);

  // 清除分片
  await sb.from('writer_file_chunks').delete().eq('file_id', fileId);

  // 完成
  setTimeout(() => progressBar.classList.remove('show'), 1000);
  await loadFiles();
}

function updateProgress(bar, text, current, total) {
  const pct = total > 0 ? Math.round((current / total) * 100) : 0;
  bar.style.width = pct + '%';
  text.textContent = `${current}/${total} 分片 (${pct}%)`;
}

// ===== 文件预览/操作 =====
const DEL_PREFIX = '_DEL_'; // 软删除文件名前缀

function previewFileById(id) {
  const file = files.find(f => f.id === id);
  if (!file) return;
  previewFile = file;
  isEditing = false;
  document.getElementById('previewTitle').textContent = `📄 ${file.name}`;
  const body = document.getElementById('previewBody');
  const isMd = file.name.toLowerCase().endsWith('.md');
  if (isMd && typeof marked !== 'undefined' && marked.parse) {
    body.className = 'preview-body';
    body.innerHTML = marked.parse(file.content || '(空文件)');
  } else {
    body.className = 'preview-body txt-preview';
    body.textContent = file.content || '(空文件)';
  }
  // 显示编辑按钮和其他操作按钮
  document.getElementById('btnEditFile').style.display = '';
  showPreviewActions(true);
  document.getElementById('filePreview').classList.add('show');
}

function showPreviewActions(showRegular) {
  const actions = document.getElementById('previewActions');
  const btns = actions.querySelectorAll('button');
  btns.forEach(b => {
    const isEdit = b.id === 'btnEditFile';
    const isSaveCancel = b.classList.contains('btn-save-edit') || b.classList.contains('btn-cancel-edit');
    if (showRegular) {
      b.style.display = isSaveCancel ? 'none' : '';
    } else {
      b.style.display = isEdit ? 'none' : (isSaveCancel ? '' : 'none');
    }
  });
}

function editPreviewFile() {
  if (!previewFile) return;
  isEditing = true;
  const body = document.getElementById('previewBody');
  body.className = 'preview-body';
  body.innerHTML = `<textarea class="preview-edit-textarea" id="editTextarea">${escHtml(previewFile.content || '')}</textarea>`;
  // 隐藏常规按钮，显示保存/取消
  showPreviewActions(false);
  // 在操作栏添加保存/取消按钮
  const actions = document.getElementById('previewActions');
  // 检查是否已有保存取消按钮
  if (!document.getElementById('btnSaveEdit')) {
    const saveBtn = document.createElement('button');
    saveBtn.id = 'btnSaveEdit';
    saveBtn.className = 'btn-save-edit';
    saveBtn.textContent = '💾 保存';
    saveBtn.onclick = savePreviewEdit;
    const cancelBtn = document.createElement('button');
    cancelBtn.id = 'btnCancelEdit';
    cancelBtn.className = 'btn-cancel-edit';
    cancelBtn.textContent = '取消';
    cancelBtn.onclick = cancelPreviewEdit;
    actions.insertBefore(saveBtn, actions.firstChild);
    actions.insertBefore(cancelBtn, actions.firstChild);
  } else {
    document.getElementById('btnSaveEdit').style.display = '';
    document.getElementById('btnCancelEdit').style.display = '';
  }
  // 标题加个提示
  document.getElementById('previewTitle').textContent = `✏️ ${previewFile.name}`;
  // 聚焦输入框
  setTimeout(() => document.getElementById('editTextarea').focus(), 100);
}

async function savePreviewEdit() {
  if (!previewFile) return;
  const newContent = document.getElementById('editTextarea').value;
  // 更新数据库
  const { error } = await sb.from('writer_files').update({
    content: newContent,
    size: newContent.length
  }).eq('id', previewFile.id);
  if (error) {
    alert('保存失败，请重试 >_<');
    return;
  }
  // 更新内存
  previewFile.content = newContent;
  previewFile.size = newContent.length;
  // 更新本地文件数组
  const idx = files.findIndex(f => f.id === previewFile.id);
  if (idx >= 0) files[idx] = previewFile;
  // 切回预览模式
  cancelPreviewEdit();
  // 刷新文件树（更新大小）
  renderFileTree();
}

function cancelPreviewEdit() {
  isEditing = false;
  if (!previewFile) return;
  // 恢复到查看模式
  previewFileById(previewFile.id);
}

function closePreview() {
  document.getElementById('filePreview').classList.remove('show');
  previewFile = null;
  isEditing = false;
}

function downloadPreview() {
  if (!previewFile) return;
  const blob = new Blob([previewFile.content], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = previewFile.name;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

async function deleteFile(id) {
  if (!confirm('确定删除这个文件吗？删除后可以在回收站恢复～')) return;
  const file = files.find(f => f.id === id);
  if (!file) return;
  // 软删除：文件名加 _DEL_ 前缀
  const newName = DEL_PREFIX + file.name;
  const { error } = await sb.from('writer_files').update({ name: newName }).eq('id', id);
  if (error) { alert('删除失败 >_<'); return; }
  if (previewFile && previewFile.id === id) closePreview();
  file.name = newName;
  files = files.filter(f => f.id !== id);
  files.unshift(file); // 放回数组但会被过滤掉
  renderFileTree();
}

// ===== 回收站 =====
let showTrashView = false;

function toggleTrash() {
  showTrashView = !showTrashView;
  if (showTrashView) {
    renderTrashView();
  } else {
    renderFileTree();
  }
}

function renderTrashView() {
  const el = document.getElementById('fileTree');
  const trashFiles = files.filter(f => f.name.startsWith(DEL_PREFIX));
  
  if (trashFiles.length === 0) {
    el.innerHTML = '<div class="tree-empty">回收站是空的 🗑️</div>';
    return;
  }
  
  let html = '<div class="tree-actions" style="margin-bottom:8px">';
  html += '<div class="tree-action" onclick="toggleTrash()" style="background:#e8f5e9;color:#3d7a5a;font-weight:700">◀ 返回文件列表</div>';
  html += '</div>';
  html += '<div style="padding:8px;font-size:12px;color:#999'>回收站里的文件可以恢复或彻底删除</div>';
  trashFiles.forEach(f => {
    const origName = f.name.substring(DEL_PREFIX.length);
    html += `<div class="tree-file" onclick="previewFileById(${f.id})">
      <span>🗑️</span>
      <span class="fname" style="color:#999">${escHtml(origName)}</span>
      <span class="fops">
        <button onclick="event.stopPropagation();restoreFile(${f.id})" title="恢复" style="color:#4caf50">↩️</button>
        <button onclick="event.stopPropagation();permanentDeleteFile(${f.id})" title="彻底删除" style="color:#e53935">💣</button>
      </span>
    </div>`;
  });
  
  html += '<div class="tree-actions">';
  html += '<div class="tree-action" onclick="emptyTrash()" style="color:#e53935">🗑️ 清空回收站</div>';
  html += '<div class="tree-action" onclick="toggleTrash()">◀ 返回文件列表</div>';
  html += '</div>';
  
  el.innerHTML = html;
}

async function restoreFile(id) {
  const file = files.find(f => f.id === id);
  if (!file) return;
  const origName = file.name.substring(DEL_PREFIX.length);
  const { error } = await sb.from('writer_files').update({ name: origName }).eq('id', id);
  if (error) { alert('恢复失败 >_<'); return; }
  file.name = origName;
  renderTrashView();
  renderFileTree();
}

async function permanentDeleteFile(id) {
  if (!confirm('确定彻底删除这个文件吗？删除后无法恢复！')) return;
  await sb.from('writer_file_chunks').delete().eq('file_id', id);
  await sb.from('writer_files').delete().eq('id', id);
  if (previewFile && previewFile.id === id) closePreview();
  files = files.filter(f => f.id !== id);
  renderTrashView();
  renderFileTree();
}

async function emptyTrash() {
  if (!confirm('确定清空回收站？所有文件将彻底删除，无法恢复！')) return;
  const trashFiles = files.filter(f => f.name.startsWith(DEL_PREFIX));
  for (const f of trashFiles) {
    await sb.from('writer_file_chunks').delete().eq('file_id', f.id);
    await sb.from('writer_files').delete().eq('id', f.id);
  }
  files = files.filter(f => !f.name.startsWith(DEL_PREFIX));
  renderTrashView();
}

  if (!previewFile) return;
  quoteFile = previewFile;
  closePreview();
  document.getElementById('quoteFileName').textContent = quoteFile.name;
  document.getElementById('quoteBar').classList.add('show');
  document.getElementById('chatInput').value = '帮我续写这个文件 ✍️';
  autoResize(document.getElementById('chatInput'));
  sendMessage();
}

function openFileAiExpand() {
  if (!previewFile) return;
  quoteFile = previewFile;
  closePreview();
  document.getElementById('quoteFileName').textContent = quoteFile.name;
  document.getElementById('quoteBar').classList.add('show');
  document.getElementById('chatInput').value = '帮我扩写这个文件 🔍';
  autoResize(document.getElementById('chatInput'));
  sendMessage();
}

// ===== 引用文件 =====
function openFileAiQuote() {
  if (!previewFile) return;
  quoteFile = previewFile;
  closePreview();
  document.getElementById('quoteFileName').textContent = quoteFile.name;
  document.getElementById('quoteBar').classList.add('show');
  document.getElementById('chatInput').focus();
}

function removeQuote() {
  quoteFile = null;
  document.getElementById('quoteBar').classList.remove('show');
}

// ==================== 工具函数 ====================
function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function formatSize(bytes) {
  if (!bytes) return '';
  if (bytes < 1024) return bytes + 'B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + 'KB';
  return (bytes/1024/1024).toFixed(1) + 'MB';
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
